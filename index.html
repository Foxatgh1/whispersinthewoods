<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whispers in the Woods</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        const SKIP_HOME_PAGE = false;
        if (SKIP_HOME_PAGE) window.location.replace('game.html');
    </script>
</head>
<body class="home-page">

    <div id="home-container">
        <img id="home-logo" src="assets/witwlogo.webp" alt="Whispers in the Woods">
        <div id="home-buttons">
            <button class="home-btn" id="start-btn">Start</button>
            <button class="home-btn" id="tutorial-btn">Tutorial</button>
            <button class="home-btn" id="about-btn">About</button>
        </div>
    </div>


<script>
    document.getElementById('start-btn').addEventListener('click', () => {
        document.body.style.transition = 'opacity 0.5s';
        document.body.style.opacity = '0';
        setTimeout(() => window.location.href = 'game.html', 500);
    });

    document.getElementById('tutorial-btn').addEventListener('click', () => {
        document.body.style.transition = 'opacity 0.5s';
        document.body.style.opacity = '0';
        setTimeout(() => window.location.href = 'tutorial.html', 500);
    });
</script>
</body>
</html>
